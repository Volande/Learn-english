<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulary Trainer</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007AFF">

<style>
body { font-family: -apple-system, sans-serif; padding: 15px; background:#f5f5f5; }
input, button { font-size:16px; margin:5px 0; padding:10px; width:90%; border-radius:8px; border:1px solid #ccc; }
input, textarea, select {
    width: 100%;
    box-sizing: border-box;
    max-width: 100%;
}
button { background:#007AFF; color:white; border:none; }
.card { background:white; padding:15px; border-radius:12px; margin-bottom:10px; }
</style>
</head>
<body>

<h2>📚 Vocabulary Trainer</h2>

<button onclick="reloadApp()">🔄 Перезавантажити</button>

<div class="card">
  <h3 onclick="toggleAdd()" style="cursor:pointer;">➕ Додавання слова</h3>
  <div id="addBlock" style="display:none;">
    <input id="ua" placeholder="Українське слово">
    <input id="en" placeholder="Англійський переклад">
    <button onclick="addWord()">Додати</button>
  </div>
</div>

<div class="card">
  <h3 onclick="toggleTest()" style="cursor:pointer;">🧠 Тести</h3>
  <div id="testBlock" style="display:none;">
    <input id="testCount" type="number" placeholder="Кількість слів у тесті">
    <button onclick="startTest()">Почати тест</button>
    <button onclick="startWeakTest()">Слабкі слова</button>

  </div>
</div>

<div id="testArea" class="card" style="display:none;">
    <!-- тут сам тест -->
</div>

<div id="resultsBox" class="card" style="display:none;">
    <h3>Результати</h3>

    <button onclick="retryBad()">🔁 Повторити слабкі</button>
    <button onclick="filterResults('all')">Всі</button>
    <button onclick="filterResults('bad')">🔴 Погані</button>
    <button onclick="filterResults('medium')">🟡 Середні</button>
    <button onclick="filterResults('good')">🟢 Добрі</button>

    <div id="resultsList"></div>

    <button onclick="closeResults()">Закрити</button>
</div>

<div class="card">

<h3 onclick="toggleExport()" style="cursor:pointer;">📎    </h3>

 <div id="Export" style="display:none;">
<button onclick="exportData()">📥 Експорт</button>
<input type="file" onchange="importData(event)">
   </div> 
</div> 

<div class="card">
  <h3 onclick="toggleWordBase()" style="cursor:pointer;">
    📖 База слів
  </h3>
  <div id="wordBase" style="display:none;">
    <div id="wordList"></div>
  </div>
</div>

<script>

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
  

let userAnswers = [];

let words = JSON.parse(localStorage.getItem("words") || "[]");
let current = null;

function save(){ localStorage.setItem("words", JSON.stringify(words)); }

function addWord(){
  let ua = document.getElementById("ua").value;
  let en = document.getElementById("en").value;
  if(!ua || !en) return;
  words.push({ua,en,correct:0,wrong:0});
  save();
  renderWords();
  document.getElementById("ua").value="";
  document.getElementById("en").value="";
}

function startTest(){
 userAnswers = [];
  let count = +document.getElementById("testCount").value || words.length;
  runTest(shuffle([...words]).slice(0,count));
}

function startWeakTest(){
  let weak = [...words].sort((a,b)=> (b.wrong-b.correct)-(a.wrong-a.correct));
  runTest(weak.slice(0,10));
}

function runTest(list){
  userAnswers = [];
  if(list.length===0) return;
  current = list;
  nextWord();
  
}

function nextWord(){
  if(current.length===0){ alert("Тест завершено"); return; }
  let w = current.pop();
  let area = document.getElementById("testArea");
  area.style.display="block";
  area.innerHTML = `
    <h3>${w.ua}</h3>
    <input id="answer" placeholder="Введи переклад">
    <button onclick="check('${w.en}', ${words.indexOf(w)})">OK</button>
  `;

if(current>= testWords.length){
  showResults();
  return;
}

}

function check(correctAnswer, index){
  let val = document.getElementById("answer").value.trim().toLowerCase();

  let status;

  if(val === correctAnswer.toLowerCase()){
    words[index].correct++;
    status = "good";
    alert("✅");
  } else if (val !== "") {
    words[index].wrong++;
    status = "medium";
    alert("❌ " + correctAnswer);
  } else {
    words[index].wrong++;
    status = "bad";
    alert("❌ " + correctAnswer);
  }

  // 🔥 ЗБЕРІГАЄМО РЕЗУЛЬТАТ
  userAnswers.push({
    question: words[index].ua,     // або як у тебе називається українське слово
    correct: correctAnswer,
    user: val,
    status: status
  });

  save();
  renderWords();
  nextWord();
}

function shuffle(a){ return a.sort(()=>Math.random()-0.5); }

function exportData(){
  let blob = new Blob([JSON.stringify(words)], {type:"application/json"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "backup.json";
  a.click();
}

function importData(e){
  let reader = new FileReader();
  reader.onload = function(){
    words = JSON.parse(reader.result);
    save();
    renderWords();
    alert("Імпортовано");
  };
  reader.readAsText(e.target.files[0]);
}

function autoBackup(){
  let today = new Date().toISOString().slice(0,10);
  let last = localStorage.getItem("lastBackup");
  if(last===today) return;
  if(confirm("Зробити backup?")){
    exportData();
    localStorage.setItem("lastBackup", today);
  }
}

function getColor(w){
  let score = (w.correct || 0) - (w.wrong || 0);
  if(score >= 5) return "#c8f7c5";
  if(score >= 0) return "#fff3b0";
  return "#f7c5c5";
}

function renderWords(){
  let list = document.getElementById("wordList");
  list.innerHTML = "";

  words.forEach((w, i) => {
    list.innerHTML += `
      <div style="margin-bottom:10px; padding:10px; border-radius:8px; background:${getColor(w)};">
        <b>${w.ua}</b> — ${w.en}
        <br>
        <button onclick="editWord(${i})">✏️</button>
        <button onclick="deleteWord(${i})">🗑</button>
      </div>
    `;
  });
}

function deleteWord(index){
  if(confirm("Видалити слово?")){
    words.splice(index,1);
    save();
    renderWords();
  }
}

function editWord(index){
  let newUa = prompt("Українське:", words[index].ua);
  let newEn = prompt("Англійське:", words[index].en);

  if(newUa && newEn){
    words[index].ua = newUa;
    words[index].en = newEn;
    save();
    renderWords();
  }
}

function toggleWordBase(){
  let el = document.getElementById("wordBase");
  el.style.display = el.style.display === "none" ? "block" : "none";
}

function toggleAdd(){
  let el = document.getElementById("addBlock");
  el.style.display = el.style.display === "none" ? "block" : "none";
}

function toggleExport(){
  let el = document.getElementById("Export");
  el.style.display = el.style.display === "none" ? "block" : "none";
}

function toggleTest(){
  let el = document.getElementById("testBlock");
  el.style.display = el.style.display === "none" ? "block" : "none";
}

function reloadApp() {
    if ('caches' in window) {
        caches.keys().then(names => {
            names.forEach(name => caches.delete(name));
        }).then(() => {
            location.reload();
        });
    } else {
        location.reload();
    }
}

function showResults() {
  const box = document.getElementById("resultsBox");
  const list = document.getElementById("resultsList");

  list.innerHTML = "";

  userAnswers.forEach(item => {
    const div = document.createElement("div");
    div.className = "result-item " + item.status;

    div.innerHTML = `
      <b>${item.question}</b><br>
      Ти: ${item.user || "—"}<br>
      Правильно: ${item.correct}
    `;

    list.appendChild(div);
  });

  box.style.display = "block";
}

function closeResults() {
  document.getElementById("resultsBox").style.display = "none";
}

function filterResults(type) {
  const list = document.getElementById("resultsList");
  list.innerHTML = "";

  let filtered = userAnswers;

  // Якщо є статуси (correct, wrong) в об'єктах, можна залишити фільтр
  if (type !== "all") {
    filtered = userAnswers.filter(item => item.status === type);
  }

  filtered.forEach(item => {
    const div = document.createElement("div");
    div.className = "result-item " + (item.status || "");

    div.innerHTML = `
      <b>${item.ua}</b> — ${item.eu}<br>
    `;

    list.appendChild(div);
  });
}





function retryBad() {
  // беремо тільки bad + medium
  const retryList = userAnswers.filter(item => 
    item.status === "bad" || item.status === "medium"
  );

  if (retryList.length === 0) {
    alert("Немає слабких слів 👍");
    return;
  }

  // 🔥 формуємо новий тест
  testWords = retryList.map(item => {
    return {
      ua: item.question,
      en: item.correct
    };
  });

  currentIndex = 0;
  userAnswers = [];

  document.getElementById("resultsBox").style.display = "none";
  document.getElementById("testArea").style.display = "block";

  nextWord();
}



renderWords();
autoBackup();
</script>

</body>
</html>
